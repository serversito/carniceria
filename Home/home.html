<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carnicería Bella</title>
    <link rel="icon" type="image/svg+xml" href="/!Resource/Images/Logo-carniceria.svg">
    <link rel="stylesheet" href="home.css">
</head>
<body>

    <header>

        <div class="logo">
            <img src="\!Resource\Images\Logo-carniceria.svg">
        </div>

        <div class="user-info">

            <a href="\User\user.html" class="user-photo">
                <img id="menu-foto-perfil" src="\!Resource\Images\foto-perfil.jpeg" alt="Foto de perfil">
            </a>

            <div class="user-text">
                <a href="\User\user.html">Usuario</a>
                <span class="user-role">Rol</span>
            </div>
        </div>

    </header>

    <nav class="menu-container">
        <div class="category-group">
            <button class="menu-btn" onclick="toggleMenu()">
                ☰
            </button>

            <span>Menú</span>

            <div class="lateral-group" id="menu-lateral">
                <span>Categorías</span>
                <a href="\Categories\categoria-carne.html">Carne</a>
                <a href="\Categories\categoria-despensa.html">Despensa</a>
                <a href="\Categories\categoria-embutidos.html">Embutidos</a>
                <a href="\Categories\categoria-frutas-verduras.html">Frutas y verduras</a>
                <span>Utilidades</span>
                <a href="\Employees\employees.html">Empleados</a>
                <a href="\Timetable\timetable.html">Horario</a>
            </div>

        </div>

        <ul>
            <button class="add-product-btn" onclick="toggleRegistro()">
                + Agregar producto
            </button>
        </ul>

    </nav>

    <div id="overlay"></div>

    <main>
        <section class="productos">
            <h2>Inventario</h2>

            <table>
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Nombre</th>
                        <th>Cantidad</th>
                        <th>Precio</th>
                        <th>Caducidad</th>
                        <th>Descripción</th>
                        <th></th>

                    </tr>
                </thead>

                <tbody id="tabla-productos">

                    <tr>
                    </tr>

                </tbody>

            </table>
        </section>
    </main>

    <div id="record-producto" class="registro">

        <div class="registro-content">

            <h2>Nuevo Producto</h2>

            <input type="text" id="prod-id" placeholder="ID">

            <input type="text" id="prod-nombre" placeholder="Nombre">

            <input type="text" id="prod-cantidad" placeholder="Cantidad">

            <input type="text" id="prod-precio" placeholder="Precio">

            <input type="text" id="prod-caducidad" placeholder="Fecha de caducidad" onfocus="(this.type='date')" onblur="if(!this.value) this.type='text'">

            <input type="text" id="prod-proveedor" placeholder="Proveedor">
            
            <select id="prod-categoria">
                <option value="" disabled selected hidden>Selecciona una categoría</option>
                <option value="Carne">Carne</option>
                <option value="Despensa">Despensa</option>
                <option value="Embutidos">Embutidos</option>
                <option value="Frutas y verduras">Frutas y verduras</option>
            </select>

            <textarea id="prod-descripcion" placeholder="Descripción"></textarea>

            <div class="registro-buttons">

                <button onclick="closeRegistro()">
                    Cancelar
                </button>

                <button onclick="saveProducto()">
                    Guardar
                </button>
            </div>

        </div>

    </div>

    <div id="detalle-producto" class="registro">
        <div class="detalles-card-content">
            
            <div class="detalles-card-header">
                <h2>Detalles de producto</h2>
                <button class="btn-volver-inventario" onclick="closeDetalle()">
                    ← Volver al inventario
                </button>
            </div>

            <div class="detalles-img-container">
                <img id="det-imagen" src="" alt="Producto">
            </div>

            <input type="hidden" id="det-id-oculto">

            <div class="detalles-grid-inputs">
                <div class="campo-det">
                    <label>Nombre del producto</label>
                    <input type="text" id="det-nombre" readonly>
                </div>
                <div class="campo-det">
                    <label>Proveedor</label>
                    <input type="text" id="det-proveedor" readonly>
                </div>
                
                <div class="campo-det">
                    <label>Categoría asignada</label>
                    <input type="text" id="det-categoria-input" readonly>
                    <select id="det-categoria-select" style="display: none;">
                        <option value="Carne">Carne</option>
                        <option value="Despensa">Despensa</option>
                        <option value="Embutidos">Embutidos</option>
                        <option value="Frutas y verduras">Frutas y verduras</option>
                    </select>
                </div>

                <div class="campo-det">
                    <label>Cantidad en Stock</label>
                    <input type="text" id="det-cantidad" readonly>
                </div>
                <div class="campo-det">
                    <label>Precio Unitario</label>
                    <input type="text" id="det-precio" readonly>
                </div>
                <div class="campo-det">
                    <label>Fecha de Caducidad</label>
                    <input type="text" id="det-caducidad" readonly>
                </div>
            </div>

            <div class="campo-det full-width">
                <label>Descripción / Ubicación de almacén</label>
                <textarea id="det-descripcion" readonly></textarea>
            </div>

            <div class="registro-buttons" id="det-contenedor-guardar" style="display: none; margin-top: 10px;">
                <button onclick="guardarEdicionProducto()" style="background-color: #6b8e8a; width: 100%; padding: 10px;">
                    Guardar Cambios del Producto
                </button>
            </div>

        </div>
    </div>

    <script src="home.js"></script>

</body>
</html>
