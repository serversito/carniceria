<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carniceria Bella</title>
    <link rel="icon" type="image/svg+xml" href="/!Resource/Images/Logo-carniceria.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>

        <div class="logo">
            <img src="\!Resource\Images\Logo-carniceria.svg" alt="Logo">
        </div>

    </header>
    
    <div class="visuales-container">
        <div class="registro-container">
            <h2 class="formulario-title">Registrar Empleado</h2>

            <form action="\Home\home.html" method="get">

                <div class="formulario-group">
                    <label for="text-nombre">Nombre de empleado :</label>
                    <input type="text" id="text-nombre" required>
                </div>

                <div class="formulario-group">
                    <label for="text-apellido">Apellido de empleado :</label>
                    <input type="text" id="text-apellido" required>
                </div>

                <div class="formulario-group">
                    <label for="date-nacimiento">Fecha de nacimiento :</label>
                    <input type="date" id="date-nacimiento" required>
                </div>

                <div class="formulario-group">
                    <label for="mail-usuario">Correo del empleado :</label>
                    <input type="email" id="mail-usuario" required>
                </div>

                <div class="formulario-group">
                    <label>Género :</label>
                    <div class="genero-group">
                
                        <label class="genero-label">
                            <input type="radio" name="genero" value="M" checked>
                            Masculino
                        </label>

                        <label class="genero-label">
                            <input type="radio" name="genero" value="F">
                            Femenino
                        </label>
                    </div>
                </div>

                <button type="submit" class="boton-register">CONTINUAR</button>

            </form>
            <p class="message-alt">
                ¿Ya estas registrado?
                <a href="\LogIn-SingUp\LogIn.html">inicia sesion</a>
            </p>
        </div>

        <div class="mini-slogan">
            <p>Carne de calidad desde 2001.</p>
        </div>
    </div>
    
    <div class="background"> 
        <img src="\!Resource\Images\Fondo-cow.svg" class="bg-svg c1" alt="">
        <img src="\!Resource\Images\Fondo-cow.svg" class="bg-svg c2" alt="">
        <img src="\!Resource\Images\Fondo-pig.svg" class="bg-svg p1" alt="">
        <img src="\!Resource\Images\Fondo-pig.svg" class="bg-svg p2" alt="">
        <img src="\!Resource\Images\Fondo-shp.svg" class="bg-svg s1" alt="">
        <img src="\!Resource\Images\Fondo-shp.svg" class="bg-svg s2" alt="">
    </div>
</body>
</html>
