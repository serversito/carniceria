<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carniceria Bella</title>
    <link rel="icon" type="image/svg+xml" href="/!Resource/Images/Logo-carniceria.svg">
    <link rel="stylesheet" href="LogIn-SingUp.css">
</head>
<body>

    <header>

        <div class="logo">
            <img src="\!Resource\Images\Logo-carniceria.svg" alt="Logo">
        </div>

    </header>
    
    <div class="visuales-container">
        <div class="registro-container">
            <h2 class="formulario-title">Registrar Empleado</h2>

            <form id="form-signup">

                <div class="formulario-group">
                    <label for="sign-nombre">Nombre de empleado :</label>
                    <input type="text" id="sign-nombre" required>
                </div>

                <div class="formulario-group">
                    <label for="sign-apellido">Apellido de empleado :</label>
                    <input type="text" id="sign-apellido" required>
                </div>

                <div class="formulario-group">
                    <label for="sign-nacimiento">Fecha de nacimiento :</label>
                    <input type="date" id="sign-nacimiento" required>
                </div>

                <div class="formulario-group">
                    <label for="sign-correo">Correo del empleado :</label>
                    <input type="email" id="sign-correo" required>
                </div>

                <div class="formulario-group">
                    <label>Género :</label>
                    <div class="genero-group">
                
                        <label class="genero-label">
                            <input type="radio" name="genero" value="Masculino" checked>
                            Masculino
                        </label>

                        <label class="genero-label">
                            <input type="radio" name="genero" value="Femenino">
                            Femenino
                        </label>
                    </div>
                </div>

                <button type="submit" class="boton-register">CONTINUAR</button>

            </form>
            <p class="message-alt">
                ¿Ya estas registrado?
                <a href="\LogIn-SingUp\LogIn.html">inicia sesion</a>
            </p>
        </div>

        <div class="mini-slogan">
            <p>Carne de calidad desde 2001.</p>
        </div>
    </div>
    
    <div class="background"> 
        <img src="/!Resource/Images/Fondo-cow.svg" class="bg-svg c1" alt="cow" onclick="reproducirSonido('cow')">
        <img src="/!Resource/Images/Fondo-cow.svg" class="bg-svg c2" alt="cow" onclick="reproducirSonido('cow')">
        <img src="/!Resource/Images/Fondo-pig.svg" class="bg-svg p1" alt="pig" onclick="reproducirSonido('pig')">
        <img src="/!Resource/Images/Fondo-pig.svg" class="bg-svg p2" alt="pig" onclick="reproducirSonido('pig')">
        <img src="/!Resource/Images/Fondo-shp.svg" class="bg-svg s1" alt="shp" onclick="reproducirSonido('shp')">
        <img src="/!Resource/Images/Fondo-shp.svg" class="bg-svg s2" alt="shp" onclick="reproducirSonido('shp')">
    </div>

    <script src="LogIn-SingUp.js"></script>

</body>
</html>
