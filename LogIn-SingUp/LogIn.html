<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carniceria Bella</title>
    <link rel="icon" type="image/svg+xml" href="/!Resource/Images/Logo-carniceria.svg">
    <link rel="stylesheet" href="LogIn-SingUp.css">
</head>
<body>

    <header>

        <div class="logo">
            <img src="\!Resource\Images\Logo-carniceria.svg" alt="Logo">
        </div>

    </header>
    
    <div class="visuales-container">
        <div class="registro-container">
            <h2 class="formulario-title">Iniciar sesión</h2>

            <form id="form-login">

                <div class="formulario-group">
                    <label for="login-nombre">Nombre de empleado :</label>
                    <input type="text" id="login-nombre" required>
                </div>

                <div class="formulario-group">
                    <label for="login-apellido">Apellido de empleado :</label>
                    <input type="text" id="login-apellido" required>
                </div>

                <div class="formulario-group">
                    <label for="login-id">Id de empleado :</label>
                    <input type="text" id="login-id" required>
                </div>

                <button type="submit" class="boton-register">CONTINUAR</button>

            </form>
            <p class="message-alt">
                ¿Aún no tienes cuenta?
                <a href="\LogIn-SingUp\SignUp.html">Crea una</a>
            </p>
        </div>

        <div class="mini-slogan">
            <p>Carne de calidad desde 2001.</p>
        </div>
    </div>

    <div class="background"> 
        <img src="/!Resource/Images/Fondo-cow.svg" class="bg-svg c1" alt="" onclick="reproducirSonido('cow')">
        <img src="/!Resource/Images/Fondo-cow.svg" class="bg-svg c2" alt="" onclick="reproducirSonido('cow')">
        <img src="/!Resource/Images/Fondo-pig.svg" class="bg-svg p1" alt="" onclick="reproducirSonido('pig')">
        <img src="/!Resource/Images/Fondo-pig.svg" class="bg-svg p2" alt="" onclick="reproducirSonido('pig')">
        <img src="/!Resource/Images/Fondo-shp.svg" class="bg-svg s1" alt="" onclick="reproducirSonido('shp')">
        <img src="/!Resource/Images/Fondo-shp.svg" class="bg-svg s2" alt="" onclick="reproducirSonido('shp')">
    </div>

    <script src="LogIn-SingUp.js"></script>
    
</body>
</html>
