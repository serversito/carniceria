<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carnicería Bella</title>
    <link rel="icon" type="image/svg+xml" href="/!Resource/Images/Logo-carniceria.svg">
    <link rel="stylesheet" href="user.css">
</head>
<body>

    <header>
        <div class="logo">
            <img src="\!Resource\Images\Logo-carniceria.svg">
        </div>
    </header>

    <nav class="menu-container">
        <ul>
            <li><a href="\Home\home.html"><img src="\!Resource\Images\Icono-volver.png"></a></li>
        </ul>
    </nav>

    <div class="visuales-container">

        <div class="usuario-container">

            <img src="\!Resource\Images\image 9(11).png" alt="user-info">
            <h2>Puerkin</h2>
            <span class="user-role">Administrador</span>
        </div>

        <div class="datos-container">

            <div class="data-group">

                <label>Nombre de empleado :</label>
                <div class="info-row">
                    <div class="inf-caja" id="text-nombre">Puerkin</div>

                </div>

                <label>Apellido de empleado :</label>
                <div class="info-row">
                    <div class="inf-caja" id="text-apellido">Black</div>

                </div>

                <label>ID de empleado :</label>
                <div class="info-row">
                    <div class="inf-caja" id="text-id">12418</div>

                </div>

                <label>Fecha de nacimiento :</label>
                <div class="info-row">
                    <div class="inf-caja" id="date-nacimiento">2000-01-01</div>

                </div>

                <label>Correo electrónico :</label>
                <div class="info-row">
                    <div class="inf-caja" id="text-nombre">ejemplo.admin@gmail.com</div>

                </div>

                <label>Genero :</label>
                <div class="info-row">
                    <div class="inf-caja">Masculino</div>

                </div>
                
            </div>
        </div>

        <div class="logout-container">
            <a href="\LogIn-SingUp\LogIn.html" class="logout-btn">
                Cerrar sesión
            </a>
        </div>

        <div class="background"> 
            <img src="\!Resource\Images\Fondo-cow.svg" class="bg-svg c1" alt="">
            <img src="\!Resource\Images\Fondo-cow.svg" class="bg-svg c2" alt="">
            <img src="\!Resource\Images\Fondo-pig.svg" class="bg-svg p1" alt="">
            <img src="\!Resource\Images\Fondo-pig.svg" class="bg-svg p2" alt="">
            <img src="\!Resource\Images\Fondo-shp.svg" class="bg-svg s1" alt="">
            <img src="\!Resource\Images\Fondo-shp.svg" class="bg-svg s2" alt="">
        </div>
    </div>

    <script src="user.js"></script>
    
</body>
</html>
