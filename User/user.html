<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carnicería Bella</title>
    <link rel="icon" type="image/svg+xml" href="/!Resource/Images/Logo-carniceria.svg">
    <link rel="stylesheet" href="user.css">
</head>
<body>

    <header>
        <div class="logo">
            <img src="\!Resource\Images\Logo-carniceria.svg">
        </div>
    </header>

    <nav class="menu-container">
        <ul>
            <li><a href="\Home\home.html"><img src="\!Resource\Images\Icono-volver.png"></a></li>
        </ul>
    </nav>

    <div class="visuales-container">

        <div class="usuario-container">
            <label for="input-foto" class="foto-perfil-label" title="Haz clic para cambiar tu foto de perfil">
                <img id="foto-perfil" src="/!Resource/Images/Foto-perfil.jpeg" alt="user-info">
                <div class="overlay-editar">Cambiar Foto</div>
            </label>
            <input type="file" id="input-foto" accept="image/*" style="display: none;" onchange="cambiarFotoPerfil(this)">
            
            <h2>usuario</h2>
            <span class="user-role">rol</span>
        </div>

        <div class="datos-container">
            <div class="data-group">

                <label>Nombre de empleado :</label>
                <div class="info-row">
                    <div class="inf-caja" id="text-nombre">Puerkin</div>
                    <button class="btn-editar" id="btn-nombre" onclick="conmutarEdicion('nombre', 'text-nombre', 'btn-nombre')">
                        <img src="/!Resource/Images/icono-editar.png" alt="Editar">
                    </button>
                </div>

                <label>Apellido de empleado :</label>
                <div class="info-row">
                    <div class="inf-caja" id="text-apellido">Black</div>
                    <button class="btn-editar" id="btn-apellido" onclick="conmutarEdicion('apellido', 'text-apellido', 'btn-apellido')">
                        <img src="/!Resource/Images/icono-editar.png" alt="Editar">
                    </button>
                </div>

                <label>ID de empleado :</label>
                <div class="info-row">
                    <!-- El ID permanece siempre bloqueado -->
                    <div class="inf-caja" id="text-id">12418</div>
                </div>

                <label>Fecha de nacimiento :</label>
                <div class="info-row">
                    <div class="inf-caja" id="date-nacimiento">2000-01-01</div>
                    <button class="btn-editar" id="btn-nacimiento" onclick="conmutarEdicion('nacimiento', 'date-nacimiento', 'btn-nacimiento')">
                        <img src="/!Resource/Images/icono-editar.png" alt="Editar">
                    </button>
                </div>

                <label>Correo electrónico :</label>
                <div class="info-row">
                    <div class="inf-caja" id="text-correo">ejemplo.admin@gmail.com</div>
                    <button class="btn-editar" id="btn-correo" onclick="conmutarEdicion('correo', 'text-correo', 'btn-correo')">
                        <img src="/!Resource/Images/icono-editar.png" alt="Editar">
                    </button>
                </div>

                <label>Género :</label>
                <div class="info-row">
                    <div class="inf-caja" id="text-genero">Masculino</div>
                    <button class="btn-editar" id="btn-genero" onclick="conmutarEdicion('genero', 'text-genero', 'btn-genero')">
                        <img src="/!Resource/Images/icono-editar.png" alt="Editar">
                    </button>
                </div>
                
            </div>
        </div>

        <div class="logout-container">
            <a href="\LogIn-SingUp\LogIn.html" class="logout-btn">
                Cerrar sesión
            </a>
        </div>

        <div class="background"> 
            <img src="/!Resource/Images/Fondo-cow.svg" class="bg-svg c1" alt="" onclick="reproducirSonido('cow')">
            <img src="/!Resource/Images/Fondo-cow.svg" class="bg-svg c2" alt="" onclick="reproducirSonido('cow')">
            <img src="/!Resource/Images/Fondo-pig.svg" class="bg-svg p1" alt="" onclick="reproducirSonido('pig')">
            <img src="/!Resource/Images/Fondo-pig.svg" class="bg-svg p2" alt="" onclick="reproducirSonido('pig')">
            <img src="/!Resource/Images/Fondo-shp.svg" class="bg-svg s1" alt="" onclick="reproducirSonido('shp')">
            <img src="/!Resource/Images/Fondo-shp.svg" class="bg-svg s2" alt="" onclick="reproducirSonido('shp')">
        </div>
        
    </div>

    <script src="user.js"></script>
    
</body>
</html>
